<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; overflow: hidden; touch-action: none; }
        .app-container { display: flex; flex-direction: column; height: 98vh; gap: 10px; }
        
        /* СЦЕНА (МОКАП) */
        .stage { 
            position: relative; width: 100%; aspect-ratio: 1/1; 
            background: #151515; border-radius: 20px; overflow: hidden; border: 1px solid #333;
            box-shadow: inset 0 0 50px #000;
        }

        /* КОЛІР ОДЯГУ (з маскою, щоб не фарбувати фон) */
        .color-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 1; transition: 0.3s;
            -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
        }
        
        .shadow-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; mix-blend-mode: multiply; z-index: 2; pointer-events: none;
        }

        /* ПРИНТИ */
        .print-obj {
            position: absolute; z-index: 5; cursor: move; display: none;
            touch-action: none; user-select: none;
        }
        .print-obj.active { outline: 2px solid #fff; outline-offset: 5px; }

        /* ІНТЕРФЕЙС */
        .controls { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .row { display: flex; gap: 10px; }
        select, button { 
            background: #1a1a1a; color: #fff; border: 1px solid #333; 
            padding: 12px; border-radius: 12px; font-size: 14px; width: 100%;
        }
        .btn-buy { background: #fff; color: #000; font-weight: bold; border: none; margin-top: 5px; }
        input[type=range] { width: 100%; accent-color: #fff; margin: 10px 0; }
        label { font-size: 11px; color: #888; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="stage" id="stage">
        <div id="color-layer" class="color-layer" style="-webkit-mask-image: url('https://raw.githubusercontent.com/EngineApparel/engine.apparel.web/main/hoodie_full.png');"></div>
        <img id="base-img" class="shadow-layer" src="https://raw.githubusercontent.com/EngineApparel/engine.apparel.web/main/hoodie_full.png">
        
        <img id="front-img" class="print-obj" src="" style="width: 80px; top: 100px; left: 50px;">
        <img id="back-img" class="print-obj" src="" style="width: 80px; top: 100px; left: 220px;">
    </div>

    <div class="controls">
        <div class="row">
            <select id="type-sel" onchange="updateType()">
                <option value="hoodie_full.png">Худі</option>
                <option value="zip_full.png">Зіп-худі</option>
                <option value="tshirt_full.png">Футболка</option>
            </select>
            <select id="color-sel" onchange="updateColor()">
                <option value="#ffffff">Білий</option>
                <option value="#1a1a1a">Чорний</option>
                <option value="#4b5320">Хакі</option>
                <option value="#7b1113">Бордо</option>
            </select>
        </div>

        <div id="zoom-ctrl" style="display:none">
            <label>МАСШТАБ ПРИНТА:</label>
            <input type="range" min="30" max="220" value="80" oninput="resizePrint(this.value)">
        </div>

        <div class="row">
            <button onclick="document.getElementById('f-up').click()">ФОТО: ПЕРЕД</button>
            <button onclick="document.getElementById('b-up').click()">ФОТО: СПИНА</button>
            <input type="file" id="f-up" hidden onchange="upload(event, 'front-img')">
            <input type="file" id="b-up" hidden onchange="upload(event, 'back-img')">
        </div>

        <select id="size-sel">
            <option>Розмір: S</option><option selected>M</option><option>L</option><option>XL</option>
        </select>

        <button class="btn-buy" onclick="sendToBot()">ДОДАТИ В КОШИК 🛒</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    let activeId = null;

    // Універсальна функція перетягування (PC + Mobile)
    function initDrag(el) {
        let isDragging = false;
        let startX, startY;
        let x = parseInt(el.style.left), y = parseInt(el.style.top);

        const start = (e) => {
            if (e.target !== el) return;
            activeId = el.id;
            document.querySelectorAll('.print-obj').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('zoom-ctrl').style.display = 'block';

            isDragging = true;
            let ev = e.type === 'touchstart' ? e.touches[0] : e;
            startX = ev.clientX - x;
            startY = ev.clientY - y;
        };

        const move = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            let ev = e.type === 'touchmove' ? e.touches[0] : e;
            x = ev.clientX - startX;
            y = ev.clientY - startY;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
        };

        const end = () => { isDragging = false; };

        // Події мишки
        el.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);

        // Події тача
        el.addEventListener('touchstart', start);
        window.addEventListener('touchmove', move, { passive: false });
        window.addEventListener('touchend', end);
    }

    initDrag(document.getElementById('front-img'));
    initDrag(document.getElementById('back-img'));

    function resizePrint(v) { if(activeId) document.getElementById(activeId).style.width = v + 'px'; }

    function updateType() {
        let file = document.getElementById('type-sel').value;
        let url = "https://raw.githubusercontent.com/EngineApparel/engine.apparel.web/main/" + file;
        document.getElementById('color-layer').style.webkitMaskImage = `url('${url}')`;
        document.getElementById('base-img').src = url;
    }

    function updateColor() {
        document.getElementById('color-layer').style.backgroundColor = document.getElementById('color-sel').value;
    }

    function upload(e, id) {
        let reader = new FileReader();
        reader.onload = () => {
            let el = document.getElementById(id);
            el.src = reader.result; el.style.display = 'block';
            activeId = id;
            document.getElementById('zoom-ctrl').style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function sendToBot() {
        let data = {
            type: document.getElementById('type-sel').selectedOptions[0].text,
            color: document.getElementById('color-sel').selectedOptions[0].text,
            size: document.getElementById('size-sel').value,
            front: document.getElementById('front-img').src.length > 100,
            back: document.getElementById('back-img').src.length > 100
        };
        tg.sendData(JSON.stringify(data));
        tg.close();
    }
</script>
</body>
</html>
