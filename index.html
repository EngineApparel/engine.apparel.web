<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; overflow: hidden; touch-action: none; }
        .stage { 
            position: relative; width: 100%; aspect-ratio: 1/1; 
            background: #151515; border-radius: 20px; overflow: hidden; border: 1px solid #333;
        }
        .color-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 1; -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
        }
        .shadow-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; mix-blend-mode: multiply; z-index: 2; pointer-events: none; }
        .print-obj { position: absolute; z-index: 5; cursor: move; display: none; touch-action: none; user-select: none; }
        .print-obj.active { outline: 2px solid #fff; }
        .controls { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .row { display: flex; gap: 8px; }
        select, button { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 12px; font-size: 14px; width: 100%; }
        .btn-buy { background: #fff; color: #000; font-weight: bold; border: none; }
        input[type=range] { width: 100%; accent-color: #fff; }
    </style>
</head>
<body>

<div class="stage" id="stage">
    <div id="color-layer" class="color-layer" style="-webkit-mask-image: url('https://raw.githubusercontent.com/EngineApparel/engine.apparel.web/main/hoodie_full.png');"></div>
    <img id="base-img" class="shadow-layer" src="https://raw.githubusercontent.com/EngineApparel/engine.apparel.web/main/hoodie_full.png">
    <img id="front-img" class="print-obj" src="" style="width: 80px; top: 100px; left: 50px;">
    <img id="back-img" class="print-obj" src="" style="width: 80px; top: 100px; left: 220px;">
</div>

<div class="controls">
    <div class="row">
        <select id="type-sel" onchange="updateBase()">
            <option value="hoodie_full.png">Худі</option>
            <option value="zip_full.png">Зіп-худі</option>
            <option value="tshirt_full.png">Футболка</option>
        </select>
        <select id="color-sel" onchange="updateColor()">
            <option value="#ffffff">Білий</option>
            <option value="#1a1a1a">Чорний</option>
            <option value="#4b5320">Хакі</option>
            <option value="#7b1113">Бордо</option>
        </select>
    </div>
    <div id="zoom-ctrl" style="display:none">
        <input type="range" min="30" max="220" value="80" oninput="if(activeId) document.getElementById(activeId).style.width = this.value + 'px'">
    </div>
    <div class="row">
        <button onclick="document.getElementById('f-up').click()">ФОТО: ПЕРЕД</button>
        <button onclick="document.getElementById('b-up').click()">ФОТО: СПИНА</button>
        <input type="file" id="f-up" hidden onchange="upload(event, 'front-img')">
        <input type="file" id="b-up" hidden onchange="upload(event, 'back-img')">
    </div>
    <button class="btn-buy" onclick="sendToBot()">ДОДАТИ В КОШИК 🛒</button>
</div>

<script>
    let tg = window.Telegram.WebApp; tg.expand();
    let activeId = null;

    function initDrag(el) {
        let isDragging = false;
        let startX, startY, x = 0, y = 0;

        const start = (e) => {
            if (e.target !== el) return;
            activeId = el.id;
            document.querySelectorAll('.print-obj').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('zoom-ctrl').style.display = 'block';
            isDragging = true;
            let ev = e.type.includes('touch') ? e.touches[0] : e;
            startX = ev.clientX - el.offsetLeft;
            startY = ev.clientY - el.offsetTop;
        };

        const move = (e) => {
            if (!isDragging) return;
            let ev = e.type.includes('touch') ? e.touches[0] : e;
            el.style.left = (ev.clientX - startX) + 'px';
            el.style.top = (ev.clientY - startY) + 'px';
        };

        el.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => isDragging = false);
        el.addEventListener('touchstart', start);
        window.addEventListener('touchmove', move, { passive: false });
        window.addEventListener('touchend', () => isDragging = false);
    }

    initDrag(document.getElementById('front-img'));
    initDrag(document.getElementById('back-img'));

    function updateBase() {
        let file = document.getElementById('type-sel').value;
        let url = "https://raw.githubusercontent.com/EngineApparel/engine.apparel.web/main/" + file;
        document.getElementById('color-layer').style.webkitMaskImage = `url('${url}')`;
        document.getElementById('base-img').src = url;
    }

    function updateColor() { document.getElementById('color-layer').style.backgroundColor = document.getElementById('color-sel').value; }

    function upload(e, id) {
        let reader = new FileReader();
        reader.onload = () => {
            let img = document.getElementById(id);
            img.src = reader.result; img.style.display = 'block';
            activeId = id; document.getElementById('zoom-ctrl').style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function sendToBot() {
        let data = {
            type: document.getElementById('type-sel').selectedOptions[0].text,
            color: document.getElementById('color-sel').selectedOptions[0].text,
            size: "M", front: document.getElementById('front-img').src.length > 100,
            back: document.getElementById('back-img').src.length > 100
        };
        tg.sendData(JSON.stringify(data)); tg.close();
    }
</script>
</body>
</html>
