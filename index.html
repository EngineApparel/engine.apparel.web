<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #050505; color: #fff; margin: 0; padding: 15px; overflow: hidden; touch-action: none; }
        .app-container { display: flex; flex-direction: column; height: 95vh; gap: 15px; }
        
        /* СЦЕНА (МОКАП) */
        .stage { 
            position: relative; width: 100%; aspect-ratio: 1/1; 
            background: #111; border-radius: 20px; overflow: hidden; border: 1px solid #333;
            box-shadow: inset 0 0 30px #000;
        }

        /* КОЛІР ОДЯГУ (з маскою) */
        .color-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 1; transition: background-color 0.3s;
            -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
        }
        
        /* ТІНІ ТА ТЕКСТУРА */
        .shadow-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; mix-blend-mode: multiply; z-index: 2; pointer-events: none;
        }

        /* ПРИНТИ */
        .print-obj {
            position: absolute; z-index: 5; cursor: move; display: none;
            touch-action: none; user-select: none;
            /* Початкова позиція по центру */
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .print-obj.active { outline: 2px dashed #fff; outline-offset: 4px; }

        /* ІНТЕРФЕЙС */
        .controls { display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 10px; }
        select, button { 
            background: #1a1a1a; color: #fff; border: 1px solid #333; 
            padding: 12px; border-radius: 12px; font-size: 14px; width: 100%; font-weight: 500;
        }
        .btn-buy { background: #fff; color: #000; font-weight: bold; border: none; font-size: 16px; margin-top: 5px; }
        input[type=range] { width: 100%; accent-color: #fff; margin: 10px 0; }
        label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="stage" id="stage">
        <div id="color-layer" class="color-layer" style="-webkit-mask-image: url('https://raw.githubusercontent.com/EngineApparel/engine.apparel.web/main/hoodie_full.png');"></div>
        <img id="base-img" class="shadow-layer" src="https://raw.githubusercontent.com/EngineApparel/engine.apparel.web/main/hoodie_full.png">
        
        <img id="front-img" class="print-obj" src="" style="width: 80px;">
        <img id="back-img" class="print-obj" src="" style="width: 80px;">
    </div>

    <div class="controls">
        <div class="row">
            <select id="type-sel" onchange="updateType()">
                <option value="hoodie_full.png">Худі</option>
                <option value="zip_full.png">Зіп-худі</option>
                <option value="tshirt_full.png">Футболка</option>
            </select>
            <select id="color-sel" onchange="updateColor()">
                <option value="#ffffff">Білий</option>
                <option value="#111111">Чорний</option>
                <option value="#555555">Сірий</option>
                <option value="#4b5320">Хакі</option>
                <option value="#7b1113">Бордо</option>
            </select>
        </div>

        <div id="zoom-ctrl" style="display:none; background: #111; padding: 10px; border-radius: 12px; border: 1px solid #333;">
            <label>Масштаб принта:</label>
            <input type="range" min="30" max="250" value="80" oninput="resizePrint(this.value)">
        </div>

        <div class="row">
            <button onclick="document.getElementById('f-up').click()">+ ФОТО ПЕРЕД</button>
            <button onclick="document.getElementById('b-up').click()">+ ФОТО СПИНА</button>
            <input type="file" id="f-up" hidden accept="image/*" onchange="upload(event, 'front-img')">
            <input type="file" id="b-up" hidden accept="image/*" onchange="upload(event, 'back-img')">
        </div>

        <select id="size-sel">
            <option>Розмір: S</option><option selected>Розмір: M</option><option>Розмір: L</option><option>Розмір: XL</option>
        </select>

        <button class="btn-buy" onclick="sendToBot()">ДОДАТИ В КОШИК 🛒</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    let activeId = null;

    // Універсальна функція перетягування (PC + Mobile)
    function initDrag(el) {
        let isDragging = false;
        let startX, startY;
        let x = 0, y = 0;

        const start = (e) => {
            if (e.target !== el) return;
            activeId = el.id;
            
            // Підсвітка активного принта
            document.querySelectorAll('.print-obj').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('zoom-ctrl').style.display = 'block';

            isDragging = true;
            let ev = e.type.includes('touch') ? e.touches[0] : e;
            
            // Вираховуємо зміщення відносно контейнера
            let rect = el.getBoundingClientRect();
            let parentRect = el.parentElement.getBoundingClientRect();
            
            x = rect.left - parentRect.left;
            y = rect.top - parentRect.top;
            
            startX = ev.clientX - x;
            startY = ev.clientY - y;
            
            // Прибираємо transform для коректного перетягування після кліку
            el.style.transform = 'none';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
        };

        const move = (e) => {
            if (!isDragging) return;
            e.preventDefault(); // Зупиняємо скрол сторінки на телефоні
            let ev = e.type.includes('touch') ? e.touches[0] : e;
            x = ev.clientX - startX;
            y = ev.clientY - startY;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
        };

        const end = () => { isDragging = false; };

        // Події мишки (ПК)
        el.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);

        // Події дотику (Телефон)
        el.addEventListener('touchstart', start, { passive: false });
        window.addEventListener('touchmove', move, { passive: false });
        window.addEventListener('touchend', end);
    }

    initDrag(document.getElementById('front-img'));
    initDrag(document.getElementById('back-img'));

    function resizePrint(v) { if(activeId) document.getElementById(activeId).style.width = v + 'px'; }

    function updateType() {
        let file = document.getElementById('type-sel').value;
        let url = "https://raw.githubusercontent.com/EngineApparel/engine.apparel.web/main/" + file;
        document.getElementById('color-layer').style.webkitMaskImage = `url('${url}')`;
        document.getElementById('base-img').src = url;
    }

    function updateColor() {
        document.getElementById('color-layer').style.backgroundColor = document.getElementById('color-sel').value;
    }

    function upload(e, id) {
        let reader = new FileReader();
        reader.onload = () => {
            let el = document.getElementById(id);
            el.src = reader.result; 
            el.style.display = 'block';
            
            // Робимо завантажений принт одразу активним
            activeId = id;
            document.querySelectorAll('.print-obj').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('zoom-ctrl').style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function sendToBot() {
        try {
            let data = {
                type: document.getElementById('type-sel').selectedOptions[0].text,
                color: document.getElementById('color-sel').selectedOptions[0].text,
                size: document.getElementById('size-sel').value,
                front: document.getElementById('front-img').src.length > 100,
                back: document.getElementById('back-img').src.length > 100
            };
            
            // Якщо все ок - відправляємо і закриваємо
            tg.sendData(JSON.stringify(data));
            tg.close();
            
        } catch (error) {
            // Якщо щось зламалося в коді, ти побачиш це на екрані
            alert("Помилка відправки: " + error.message);
        }
    }
</script>
</body>
</html>
