<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; overflow: hidden; touch-action: none; }
        .app-container { display: flex; flex-direction: column; height: 95vh; gap: 15px; }
        
        /* Екран-підказка */
        #warning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        .warning-box { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 2px solid #555; }
        .warning-btn { background: #fff; color: #000; font-weight: bold; padding: 12px 20px; border: none; border-radius: 10px; margin-top: 15px; width: 100%; font-size: 16px; cursor: pointer; }

        /* Мокап */
        .stage { position: relative; width: 100%; aspect-ratio: 1/1; background: #111; border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        .color-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1; transition: 0.3s; -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center; }
        .shadow-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; mix-blend-mode: multiply; z-index: 2; pointer-events: none; }
        
        /* Принти */
        .print-obj { position: absolute; z-index: 5; cursor: move; display: none; touch-action: none; user-select: none; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .print-obj.active { outline: 2px dashed #fff; outline-offset: 4px; }

        /* Кнопки */
        .controls { display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 10px; }
        select, button { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 12px; font-size: 14px; width: 100%; font-weight: 500; }
        .btn-buy { background: #fff; color: #000; font-weight: bold; border: none; font-size: 16px; margin-top: 5px; cursor: pointer; }
        input[type=range] { width: 100%; accent-color: #fff; margin: 10px 0; }
        label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div id="warning-overlay">
    <div class="warning-box">
        <h2 style="margin-top:0; color: #ff4444;">⚠️ УВАГА!</h2>
        <p style="font-size: 15px; line-height: 1.5; text-align: left;">
            1. Створіть свій дизайн.<br><br>
            2. <b>ОБОВ'ЯЗКОВО ЗРОБІТЬ СКРІНШОТ</b> екрана перед тим, як натиснути кнопку "Додати в кошик".<br><br>
            3. Бот попросить вас надіслати цей скріншот, а потім самі файли принтів.
        </p>
        <button class="warning-btn" onclick="document.getElementById('warning-overlay').style.display='none'">Я зрозумів 🏁</button>
    </div>
</div>

<div class="app-container">
    <div class="stage" id="stage">
        <div id="color-layer" class="color-layer" style="-webkit-mask-image: url('https://raw.githubusercontent.com/EngineApparel/engine.apparel.web/main/hoodie_full.png');"></div>
        <img id="base-img" class="shadow-layer" src="https://raw.githubusercontent.com/EngineApparel/engine.apparel.web/main/hoodie_full.png">
        
        <img id="front-img" class="print-obj" src="" style="width: 80px;">
        <img id="back-img" class="print-obj" src="" style="width: 80px;">
    </div>

    <div class="controls">
        <div class="row">
            <select id="type-sel" onchange="updateType()">
                <option value="hoodie_full.png">Худі</option>
                <option value="zip_full.png">Зіп-худі</option>
                <option value="tshirt_full.png">Футболка</option>
            </select>
            <select id="color-sel" onchange="updateColor()">
                <option value="#ffffff">Білий</option>
                <option value="#000000">Чорний</option>
                <option value="#555555">Сірий</option>
                <option value="#4b5320">Хакі</option>
                <option value="#7b1113">Бордо</option>
            </select>
        </div>

        <div id="zoom-ctrl" style="display:none; background: #111; padding: 10px; border-radius: 12px; border: 1px solid #333;">
            <label>Масштаб принта:</label>
            <input type="range" min="30" max="250" value="80" oninput="resizePrint(this.value)">
        </div>

        <div class="row">
            <button onclick="document.getElementById('f-up').click()">+ ПЕРЕД</button>
            <button onclick="document.getElementById('b-up').click()">+ СПИНА</button>
            <input type="file" id="f-up" hidden accept="image/*" onchange="upload(event, 'front-img')">
            <input type="file" id="b-up" hidden accept="image/*" onchange="upload(event, 'back-img')">
        </div>

        <select id="size-sel">
            <option>Розмір: S</option><option selected>Розмір: M</option><option>Розмір: L</option><option>Розмір: XL</option>
        </select>

        <button class="btn-buy" onclick="sendToBot()">ДОДАТИ В КОШИК 🛒</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp; tg.expand();
    let activeId = null;

    function initDrag(el) {
        let isDragging = false, startX, startY;
        const start = (e) => {
            if (e.target !== el) return;
            activeId = el.id;
            document.querySelectorAll('.print-obj').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('zoom-ctrl').style.display = 'block';
            isDragging = true;
            let ev = e.type.includes('touch') ? e.touches[0] : e;
            startX = ev.clientX - el.offsetLeft; startY = ev.clientY - el.offsetTop;
            el.style.transform = 'none';
        };
        const move = (e) => {
            if (!isDragging) return;
            e.preventDefault(); 
            let ev = e.type.includes('touch') ? e.touches[0] : e;
            el.style.left = (ev.clientX - startX) + 'px'; el.style.top = (ev.clientY - startY) + 'px';
        };
        const end = () => { isDragging = false; };
        el.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
        el.addEventListener('touchstart', start, { passive: false }); window.addEventListener('touchmove', move, { passive: false }); window.addEventListener('touchend', end);
    }
    
    initDrag(document.getElementById('front-img')); 
    initDrag(document.getElementById('back-img'));
    
    function resizePrint(v) { if(activeId) document.getElementById(activeId).style.width = v + 'px'; }

    function updateType() {
        let file = document.getElementById('type-sel').value; 
        let url = "https://raw.githubusercontent.com/EngineApparel/engine.apparel.web/main/" + file;
        document.getElementById('color-layer').style.webkitMaskImage = `url('${url}')`; 
        document.getElementById('base-img').src = url;
    }
    function updateColor() { document.getElementById('color-layer').style.backgroundColor = document.getElementById('color-sel').value; }

    function upload(e, id) {
        if(!e.target.files[0]) return;
        let reader = new FileReader();
        reader.onload = () => {
            let el = document.getElementById(id); 
            el.src = reader.result; 
            el.style.display = 'block'; 
            activeId = id;
            document.querySelectorAll('.print-obj').forEach(p => p.classList.remove('active'));
            el.classList.add('active'); 
            document.getElementById('zoom-ctrl').style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function sendToBot() {
        try {
            // 100% надійна перевірка наявності картинок
            let imgFront = document.getElementById('front-img').src;
            let imgBack = document.getElementById('back-img').src;
            let hasFront = imgFront.startsWith('data:image');
            let hasBack = imgBack.startsWith('data:image');

            let data = {
                type: document.getElementById('type-sel').selectedOptions[0].text,
                color: document.getElementById('color-sel').selectedOptions[0].text,
                size: document.getElementById('size-sel').value,
                front: hasFront,
                back: hasBack
            };
            
            // Фінальне нагадування клієнту
            alert("📸 ЯКЩО ВИ ЩЕ НЕ ЗРОБИЛИ СКРІНШОТ - ЗРОБІТЬ ЙОГО ЗАРАЗ!\n\nПісля натискання 'ОК' бот попросить вас надіслати скріншот і файли.");
            
            tg.sendData(JSON.stringify(data)); 
            tg.close();
        } catch (error) { alert("Помилка: " + error.message); }
    }
</script>
</body>
</html>
