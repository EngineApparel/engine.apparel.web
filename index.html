<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #050505; color: #fff; margin: 0; padding: 15px; overflow: hidden; touch-action: none; }
        .app-container { display: flex; flex-direction: column; height: 95vh; gap: 15px; }
        
        /* СЦЕНА (МОКАП) */
        .stage { 
            position: relative; width: 100%; aspect-ratio: 1/1; 
            background: #111; border-radius: 20px; overflow: hidden; border: 1px solid #333;
            box-shadow: inset 0 0 30px #000;
        }

        /* КОЛІР ОДЯГУ (з маскою) */
        .color-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 1; transition: background-color 0.3s;
            -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
        }
        
        /* ТІНІ ТА ТЕКСТУРА */
        .shadow-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; mix-blend-mode: multiply; z-index: 2; pointer-events: none;
        }

        /* ПРИНТИ */
        .print-obj {
            position: absolute; z-index: 5; cursor: move; display: none;
            touch-action: none; user-select: none;
            top: 100px; left: 50px; /* Базова позиція */
        }
        .print-obj.active { outline: 2px dashed #fff; outline-offset: 4px; }

        /* ІНТЕРФЕЙС */
        .controls { display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 10px; }
        select, button { 
            background: #1a1a1a; color: #fff; border: 1px solid #333; 
            padding: 12px; border-radius: 12px; font-size: 14px; width: 100%; font-weight: 500;
        }
        .btn-buy { background: #fff; color: #000; font-weight: bold; border: none; font-size: 16px; margin-top: 5px; cursor: pointer; }
